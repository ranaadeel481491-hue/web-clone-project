<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportX | Gear Up</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SPORT<span>X</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#products">Store</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>GEAR UP FOR <span>VICTORY</span></h1>
            <p>Premium sports accessories for champions.</p>
            <br>
            <button class="btn-main" id="exploreBtn">SHOP NOW</button>
        </div>
    </header>

    <section class="products" id="products">
        <h2 class="title">Our Collection</h2>
        <div class="product-grid">
            <div class="card">
                <img src="./bat.jpeg" alt="Cricket">
                <h3>CA Cricket Bat</h3>
                <p>Rs. 55,500</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
            <div class="card" id="ball">
                <img src="./ball.jpg" alt="Football">
                <h3>Match Football</h3>
                <p>Rs. 3,200</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </div>
    </section>

    <footer class="footer" id="contact">
        <p>SportX Karachi | Premium Quality Since 2026</p>
        <p class="sub-text">&copy; All Rights Reserved.</p>
    </footer>

    <script src="./index.jss"></script>
</body>
</html>
